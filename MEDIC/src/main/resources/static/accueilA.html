<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>MEDIC - Accueil Admin</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <h1>Accueil Administrateur</h1>
    <p id="bienvenue"></p>
    <nav>
        <a href="/creer-utilisateur.html">Créer un utilisateur</a>
        <a href="/gerer-creneaux.html">Gérer les créneaux</a>
        <a href="/admin.html">Mes informations</a>
        <a href="/" onclick="deconnexion()">Se déconnecter</a>
    </nav>

    <div class="contenu">
    <hr>

    <h2>Rechercher un utilisateur</h2>
    <form id="form-recherche">
        <input type="search" id="recherche" placeholder="Nom, prénom ou spécialité...">
        <button type="submit">Rechercher</button>
    </form>
    <div id="resultats"></div>
    <p id="message"></p>

    <script src="/auth.js"></script>
    <script>
        const utilisateur = getUtilisateur();
        verifierAdmin(utilisateur);
        document.getElementById('bienvenue').textContent = `Bienvenue ${utilisateur.prenom} ${utilisateur.nom}`;

        document.getElementById('form-recherche').addEventListener('submit', function(e){
            e.preventDefault();
            rechercher();
        });

        async function rechercher(){
            const valeur = document.getElementById('recherche').value.trim();
            const url = valeur ? `?q=${encodeURIComponent(valeur)}` : '';
            const div = document.getElementById('resultats');
            div.innerHTML = '';

            try {
                const [medecins, patients] = await Promise.all([
                    fetch(`/medecins/recherche${url}`).then(r => r.json()),
                    fetch(`/patients/recherche${url}`).then(r => r.json())
                ]);

                let html = '';

                if (medecins.length > 0){
                    html += `<h3>Médecins (${medecins.length})</h3><ul>`;
                    medecins.forEach(m => {
                        html += `<li id="medecin-${m.id}">
                            <strong>Dr ${m.nom} ${m.prenom}</strong> — ${m.specialite}
                            <button onclick="modifierUtilisateur(${JSON.stringify(m).replace(/"/g, '&quot;')})">Modifier</button>
                            <button onclick="supprimerMedecin(${m.id}, this)">Supprimer</button>
                        </li>`;
                    });
                    html += '</ul>';
                }

                if (patients.length > 0){
                    html += `<h3>Patients (${patients.length})</h3><ul>`;
                    patients.forEach(p => {
                        html += `<li id="patient-${p.id}">
                            <strong>${p.nom} ${p.prenom}</strong> — ${p.email}
                            <button onclick="modifierUtilisateur(${JSON.stringify(p).replace(/"/g, '&quot;')})">Modifier</button>
                            <button onclick="supprimerPatient(${p.id}, this)">Supprimer</button>
                        </li>`;
                    });
                    html += '</ul>';
                }

                if (medecins.length === 0 && patients.length === 0){
                    html = '<p>Aucun résultat.</p>';
                }

                div.innerHTML = html;
            } catch (err) {
                div.textContent = 'Erreur lors de la recherche.';
            }
        }

        function modifierUtilisateur(u){
            localStorage.setItem('utilisateur-a-modifier', JSON.stringify(u));
            window.location.href = '/modifier-utilisateur.html';
        }

        async function supprimerMedecin(id, btn){
            if (!confirm('Supprimer ce médecin ?')) return;
            btn.disabled = true;
            const msg = document.getElementById('message');
            try {
                const response = await fetch(`/admin/medecins/${id}`, { method: 'DELETE' });
                if (response.ok){
                    document.getElementById(`medecin-${id}`).remove();
                    msg.textContent = 'Médecin supprimé.';
                } else {
                    msg.textContent = 'Erreur lors de la suppression.';
                    btn.disabled = false;
                }
            } catch (err) {
                msg.textContent = 'Erreur de connexion au serveur.';
                btn.disabled = false;
            }
        }

        async function supprimerPatient(id, btn){
            if (!confirm('Supprimer ce patient ?')) return;
            btn.disabled = true;
            const msg = document.getElementById('message');
            try {
                const response = await fetch(`/admin/patients/${id}`, { method: 'DELETE' });
                if (response.ok){
                    document.getElementById(`patient-${id}`).remove();
                    msg.textContent = 'Patient supprimé.';
                } else {
                    msg.textContent = 'Erreur lors de la suppression.';
                    btn.disabled = false;
                }
            } catch (err) {
                msg.textContent = 'Erreur de connexion au serveur.';
                btn.disabled = false;
            }
        }
    </script>
    </div>
</body>
</html>
