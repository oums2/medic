<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>MEDIC - Accueil</title>
</head>
<body>
    <h1>Accueil</h1>
    <p id="bienvenue"></p>
    <nav>
        <a href="/patient.html">Mes informations</a> |
        <a href="/" onclick="deconnexion()">Se déconnecter</a>
    </nav>

    <hr>

    <h2>Rechercher un médecin</h2>
    <form id="form-recherche">
        <input type="search" id="recherche" placeholder="Nom, prénom ou spécialité...">
        <button type="submit">Rechercher</button>
    </form>
    <div id="resultats"></div>

    <div id="rdv-section" style="display:none">
        <hr>
        <h3>Prendre RDV avec <span id="rdv-nom-medecin"></span></h3>
        <label>Jour :</label>
        <select id="rdv-jour">
            <option value="">-- Sélectionner un jour --</option>
            <option>Lundi</option><option>Mardi</option><option>Mercredi</option>
            <option>Jeudi</option><option>Vendredi</option><option>Samedi</option>
        </select>
        <button onclick="voirDispos()">Voir les disponibilités</button>
        <button onclick="fermerRdv()">Annuler</button>
        <div id="rdv-creneaux"></div>
        <p id="rdv-message"></p>
    </div>

    <hr>

    <h2>Mes rendez-vous</h2>
    <div id="liste-rdv"></div>
    <p id="message-rdv"></p>

    <script src="/auth.js"></script>
    <script>
        const utilisateur = getUtilisateur();
        verifierPatient(utilisateur);
        document.getElementById('bienvenue').textContent = `Bienvenue ${utilisateur.prenom} ${utilisateur.nom}`;

        let medecinSelectionne = null;
        let creneauSelectionne = null;

        document.getElementById('form-recherche').addEventListener('submit', function(e){
            e.preventDefault();
            rechercher();
        });

        async function rechercher(){
            const valeur = document.getElementById('recherche').value.trim();
            const url = valeur ? `/medecins/recherche?q=${encodeURIComponent(valeur)}` : '/medecins/recherche';
            try {
                const medecins = await fetch(url).then(r => r.json());
                const div = document.getElementById('resultats');
                if (medecins.length === 0){ div.innerHTML = '<p>Aucun médecin trouvé.</p>'; return; }
                let html = `<p>${medecins.length} médecin(s) trouvé(s)</p><ul>`;
                medecins.forEach(m => {
                    html += `<li>
                        <strong>Dr ${m.nom} ${m.prenom}</strong> — ${m.specialite}
                        <button onclick="ouvrirRdv(${m.id}, 'Dr ${m.prenom} ${m.nom}')">Prendre RDV</button>
                    </li>`;
                });
                html += '</ul>';
                div.innerHTML = html;
            } catch (err) {
                document.getElementById('resultats').textContent = 'Erreur lors de la recherche.';
            }
        }

        function ouvrirRdv(medecinId, nomMedecin){
            medecinSelectionne = medecinId;
            document.getElementById('rdv-nom-medecin').textContent = nomMedecin;
            document.getElementById('rdv-jour').value = '';
            document.getElementById('rdv-creneaux').innerHTML = '';
            document.getElementById('rdv-message').textContent = '';
            document.getElementById('rdv-section').style.display = 'block';
            document.getElementById('rdv-section').scrollIntoView();
        }

        function fermerRdv(){
            medecinSelectionne = null;
            document.getElementById('rdv-section').style.display = 'none';
        }

        async function voirDispos(){
            const jour = document.getElementById('rdv-jour').value;
            const msg  = document.getElementById('rdv-message');
            if (!jour){ msg.textContent = 'Veuillez choisir un jour.'; return; }
            creneauSelectionne = null;
            document.getElementById('rdv-creneaux').innerHTML = '';
            msg.textContent = '';
            try {
                const creneaux = await fetch(`/medecins/${medecinSelectionne}/dispos?jour=${encodeURIComponent(jour)}`).then(r => r.json());
                if (creneaux.length === 0){ document.getElementById('rdv-creneaux').innerHTML = '<p>Aucun créneau disponible.</p>'; return; }
                let html = `<p>${creneaux.length} créneau(x) disponible(s) :</p><p>`;
                creneaux.forEach(c => {
                    html += `<button id="creneau-${c.id}" onclick="selectionnerCreneau(${c.id},'${c.jour}','${c.heure}')">${c.heure}</button> `;
                });
                html += `</p><br><button id="btn-valider" onclick="validerRdv()" disabled>Valider</button>`;
                document.getElementById('rdv-creneaux').innerHTML = html;
            } catch (err) {
                msg.textContent = 'Erreur lors du chargement des disponibilités.';
            }
        }

        function selectionnerCreneau(id, jour, heure){
            if (creneauSelectionne){
                const ancien = document.getElementById(`creneau-${creneauSelectionne.id}`);
                if (ancien) ancien.style.fontWeight = 'normal';
            }
            creneauSelectionne = { id, jour, heure };
            document.getElementById(`creneau-${id}`).style.fontWeight = 'bold';
            document.getElementById('btn-valider').disabled = false;
        }

        async function validerRdv(){
            const msg = document.getElementById('rdv-message');
            if (!creneauSelectionne){ msg.textContent = 'Veuillez sélectionner un créneau.'; return; }
            try {
                const response = await fetch(`/rdv/patients/${utilisateur.id}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ medecinId: String(medecinSelectionne), jour: creneauSelectionne.jour, heure: creneauSelectionne.heure })
                });
                if (response.ok){
                    msg.textContent = `RDV demandé le ${creneauSelectionne.jour} à ${creneauSelectionne.heure}. En attente de validation.`;
                    document.getElementById('rdv-creneaux').innerHTML = '';
                    creneauSelectionne = null;
                    chargerRdv();
                } else {
                    const data = await response.json();
                    msg.textContent = data.message || 'Erreur lors de la réservation.';
                }
            } catch (err) {
                msg.textContent = 'Erreur de connexion au serveur.';
            }
        }

        async function chargerRdv(){
            const div = document.getElementById('liste-rdv');
            try {
                const rdvs = await fetch(`/rdv/patients/${utilisateur.id}`).then(r => r.json());
                if (rdvs.length === 0){ div.innerHTML = '<p>Aucun rendez-vous.</p>'; return; }
                let html = '<ul>';
                rdvs.forEach(rdv => {
                    const statut = rdv.valide ? 'Confirmé' : 'En attente de validation';
                    html += `<li id="rdv-${rdv.id}">
                        Dr ${rdv.medecin.nom} ${rdv.medecin.prenom} (${rdv.medecin.specialite})
                        — ${rdv.jour} à ${rdv.heure} — <em>${statut}</em>
                        <button onclick="annulerRdv(${rdv.id}, '${rdv.jour}', '${rdv.heure}', this)">Annuler</button>
                    </li>`;
                });
                html += '</ul>';
                div.innerHTML = html;
            } catch (err) {
                div.textContent = 'Erreur lors du chargement.';
            }
        }

        async function annulerRdv(rdvId, jour, heure, btn){
            btn.disabled = true;
            const msg = document.getElementById('message-rdv');
            try {
                const response = await fetch(`/rdv/${rdvId}/patients/${utilisateur.id}`, { method: 'DELETE' });
                if (response.ok){
                    document.getElementById(`rdv-${rdvId}`).remove();
                    msg.textContent = `RDV du ${jour} à ${heure} annulé.`;
                } else {
                    msg.textContent = 'Impossible d\'annuler ce rendez-vous.';
                    btn.disabled = false;
                }
            } catch (err) {
                msg.textContent = 'Erreur de connexion au serveur.';
                btn.disabled = false;
            }
        }

        chargerRdv();
    </script>
</body>
</html>
