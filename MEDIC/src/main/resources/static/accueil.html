<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>MEDIC - Accueil</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <h1>Accueil</h1>
    <p id="bienvenue"></p>

    <!-- Navigation patient : informations personnelles, notifications+messages (avec badge), déconnexion -->
    <nav>
        <a href="/patient.html">Mes informations</a>
        <a href="/notifications.html">Notifications &amp; Messages <span id="badge" style="display:none"></span></a>
        <a href="/" onclick="deconnexion()">Se déconnecter</a>
    </nav>

    <div class="contenu">
    <hr>

    <!-- Recherche de médecin par nom, prénom ou spécialité -->
    <h2>Rechercher un médecin</h2>
    <form id="form-recherche">
        <input type="search" id="recherche" placeholder="Nom, prénom ou spécialité...">
        <button type="submit">Rechercher</button>
    </form>
    <div id="resultats"></div>

    <hr>

    <!-- Liste des RDV du patient connecté (confirmés et en attente) -->
    <h2>Mes rendez-vous</h2>
    <div id="liste-rdv"></div>
    <p id="message-rdv"></p>

    <script src="/auth.js"></script>
    <script>
        const utilisateur = getUtilisateur();
        verifierPatient(utilisateur); // Redirige vers / si non connecté ou non patient
        document.getElementById('bienvenue').textContent = `Bienvenue ${utilisateur.prenom} ${utilisateur.nom}`;

        // Formate "2026-06-30" en "lundi 30 juin 2026"
        function formatDate(dateStr){
            return new Date(dateStr + 'T00:00:00').toLocaleDateString('fr-FR',
                { weekday:'long', day:'numeric', month:'long', year:'numeric' });
        }

        document.getElementById('form-recherche').addEventListener('submit', function(e){
            e.preventDefault();
            rechercher();
        });

        // Recherche les médecins via l'API et affiche les résultats avec un bouton "Prendre RDV"
        async function rechercher(){
            const valeur = document.getElementById('recherche').value.trim();
            const url = valeur ? `/medecins/recherche?q=${encodeURIComponent(valeur)}` : '/medecins/recherche';
            try {
                const medecins = await fetch(url).then(r => r.json());
                const div = document.getElementById('resultats');
                if (medecins.length === 0){ div.innerHTML = '<p>Aucun médecin trouvé.</p>'; return; }
                let html = `<p>${medecins.length} médecin(s) trouvé(s)</p><ul>`;
                medecins.forEach(m => {
                    html += `<li>
                        <strong>Dr ${m.nom} ${m.prenom}</strong> — ${m.specialite}
                        <button onclick="allerVersRdv(${JSON.stringify(m).replace(/"/g, '&quot;')})">Prendre RDV</button>
                    </li>`;
                });
                html += '</ul>';
                div.innerHTML = html;
            } catch (err) {
                document.getElementById('resultats').textContent = 'Erreur lors de la recherche.';
            }
        }

        // Stocke le médecin sélectionné en localStorage avant de naviguer vers la prise de RDV
        function allerVersRdv(medecin){
            localStorage.setItem('medecin-selectionne', JSON.stringify(medecin));
            window.location.href = '/prendre-rdv.html';
        }

        // Charge et affiche tous les RDV du patient avec leur statut (confirmé / en attente)
        async function chargerRdv(){
            const div = document.getElementById('liste-rdv');
            try {
                const maintenant = new Date().toISOString().slice(0, 16);
                const tous = await fetch(`/rdv/patients/${utilisateur.id}`).then(r => r.json());
                const rdvs = tous.filter(r => (r.jour + 'T' + r.heure) >= maintenant);
                if (rdvs.length === 0){ div.innerHTML = '<p>Aucun rendez-vous à venir.</p>'; return; }
                let html = '<ul>';
                rdvs.forEach(rdv => {
                    const statut = rdv.valide ? 'Confirmé' : 'En attente de validation';
                    html += `<li id="rdv-${rdv.id}">
                        Dr ${rdv.medecin.nom} ${rdv.medecin.prenom} (${rdv.medecin.specialite})
                        — ${formatDate(rdv.jour)} à ${rdv.heure} — <em>${statut}</em>
                        <button onclick="annulerRdv(${rdv.id}, '${rdv.jour}', '${rdv.heure}', this)">Annuler</button>
                    </li>`;
                });
                html += '</ul>';
                div.innerHTML = html;
            } catch (err) {
                div.textContent = 'Erreur lors du chargement.';
            }
        }

        // Annule un RDV et le retire de l'affichage sans recharger la page
        async function annulerRdv(rdvId, jour, heure, btn){
            btn.disabled = true;
            const msg = document.getElementById('message-rdv');
            try {
                const response = await fetch(`/rdv/${rdvId}/patients/${utilisateur.id}`, { method: 'DELETE' });
                if (response.ok){
                    document.getElementById(`rdv-${rdvId}`).remove();
                    msg.textContent = `RDV du ${jour} à ${heure} annulé.`;
                } else {
                    msg.textContent = 'Impossible d\'annuler ce rendez-vous.';
                    btn.disabled = false;
                }
            } catch (err) {
                msg.textContent = 'Erreur de connexion au serveur.';
                btn.disabled = false;
            }
        }

        chargerRdv();

        // Badge combiné : notifications non lues + messages non lus, mis à jour toutes les 30 secondes
        async function rafraichirBadge(){
            try {
                const [notifs, nonLus] = await Promise.all([
                    fetch(`/notifications/${utilisateur.id}`).then(r => r.json()),
                    fetch(`/messages/${utilisateur.id}/non-lus`).then(r => r.json())
                ]);
                const total = notifs.length + Number(nonLus);
                const b = document.getElementById('badge');
                if (total === 0){ b.style.display = 'none'; }
                else { b.textContent = total; b.style.display = 'inline'; }
            } catch (err) {}
        }

        rafraichirBadge();
        setInterval(rafraichirBadge, 30000);
    </script>
    </div>
</body>
</html>
