<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>MEDIC - Accueil Médecin</title>
</head>
<body>
    <h1>Accueil Médecin</h1>
    <p id="bienvenue"></p>
    <nav>
        <a href="/mes-creneaux.html">Mes créneaux</a> |
        <a href="/medecin.html">Mes informations</a> |
        <a href="/" onclick="deconnexion()">Se déconnecter</a>
    </nav>

    <hr>

    <h2>Rechercher un patient</h2>
    <form id="form-recherche">
        <input type="search" id="recherche" placeholder="Nom ou prénom...">
        <button type="submit">Rechercher</button>
    </form>
    <div id="resultats"></div>

    <hr>

    <h2>Rendez-vous à valider</h2>
    <div id="liste-attente"></div>
    <p id="message-attente"></p>

    <hr>

    <h2>Mon planning</h2>
    <div id="liste-planning"></div>
    <p id="message-planning"></p>

    <script src="/auth.js"></script>
    <script>
        const utilisateur = getUtilisateur();
        verifierMedecin(utilisateur);
        document.getElementById('bienvenue').textContent = `Bienvenue Dr ${utilisateur.prenom} ${utilisateur.nom}`;

        function formatDate(dateStr){
            return new Date(dateStr + 'T00:00:00').toLocaleDateString('fr-FR',
                { weekday:'long', day:'numeric', month:'long', year:'numeric' });
        }

        document.getElementById('form-recherche').addEventListener('submit', function(e){
            e.preventDefault();
            rechercherPatient();
        });

        async function rechercherPatient(){
            const valeur = document.getElementById('recherche').value.trim().toLowerCase();
            const div = document.getElementById('resultats');
            try {
                const patients = await fetch(`/medecins/${utilisateur.id}/patients`).then(r => r.json());
                const filtres = valeur
                    ? patients.filter(p => p.nom.toLowerCase().includes(valeur) || p.prenom.toLowerCase().includes(valeur))
                    : patients;
                if (filtres.length === 0){ div.innerHTML = '<p>Aucun patient trouvé.</p>'; return; }
                let html = `<p>${filtres.length} patient(s)</p><ul>`;
                filtres.forEach(p => {
                    html += `<li>
                        <strong>${p.nom} ${p.prenom}</strong> — ${p.email}
                        <button onclick="voirDossier(${JSON.stringify(p).replace(/"/g, '&quot;')})">Dossier</button>
                    </li>`;
                });
                html += '</ul>';
                div.innerHTML = html;
            } catch (err) {
                div.textContent = 'Erreur lors du chargement.';
            }
        }

        async function chargerEnAttente(){
            const div = document.getElementById('liste-attente');
            try {
                const rdvs = await fetch(`/medecins/${utilisateur.id}/rdv-en-attente`).then(r => r.json());
                if (rdvs.length === 0){ div.innerHTML = '<p>Aucun rendez-vous en attente.</p>'; return; }
                let html = '<ul>';
                rdvs.forEach(rdv => {
                    html += `<li id="rdv-att-${rdv.id}">
                        ${rdv.patient.nom} ${rdv.patient.prenom}
                        — ${formatDate(rdv.jour)} à ${rdv.heure}
                        <button onclick="validerRdv(${rdv.id}, ${rdv.patient.id}, '${rdv.patient.nom}', '${rdv.patient.prenom}', '${rdv.jour}', '${rdv.heure}', this)">Valider</button>
                        <button onclick="refuserRdv(${rdv.id}, this)">Refuser</button>
                    </li>`;
                });
                html += '</ul>';
                div.innerHTML = html;
            } catch (err) {
                div.textContent = 'Erreur lors du chargement.';
            }
        }

        async function validerRdv(rdvId, patientId, nomPatient, prenomPatient, jour, heure, btn){
            btn.disabled = true;
            const msg = document.getElementById('message-attente');
            try {
                const response = await fetch(`/medecins/${utilisateur.id}/valider-rdv`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ patientId: String(patientId), jour, heure })
                });
                if (response.ok){
                    document.getElementById(`rdv-att-${rdvId}`).remove();
                    msg.textContent = `RDV de ${nomPatient} ${prenomPatient} confirmé.`;
                    chargerPlanning();
                } else {
                    msg.textContent = 'Erreur lors de la validation.';
                    btn.disabled = false;
                }
            } catch (err) {
                msg.textContent = 'Erreur de connexion au serveur.';
                btn.disabled = false;
            }
        }

        async function refuserRdv(rdvId, btn){
            btn.disabled = true;
            const msg = document.getElementById('message-attente');
            try {
                const response = await fetch(`/rdv/${rdvId}/medecins/${utilisateur.id}`, { method: 'DELETE' });
                if (response.ok){
                    document.getElementById(`rdv-att-${rdvId}`).remove();
                    msg.textContent = 'Rendez-vous refusé.';
                } else {
                    msg.textContent = 'Erreur lors du refus.';
                    btn.disabled = false;
                }
            } catch (err) {
                msg.textContent = 'Erreur de connexion au serveur.';
                btn.disabled = false;
            }
        }

        async function chargerPlanning(){
            const div = document.getElementById('liste-planning');
            try {
                const rdvs = await fetch(`/medecins/${utilisateur.id}/planning`).then(r => r.json());
                if (rdvs.length === 0){ div.innerHTML = '<p>Aucun rendez-vous confirmé.</p>'; return; }
                const parDate = {};
                rdvs.forEach(rdv => {
                    if (!parDate[rdv.jour]) parDate[rdv.jour] = [];
                    parDate[rdv.jour].push(rdv);
                });
                let html = '';
                Object.keys(parDate).sort().forEach(jour => {
                    html += `<p><strong>${formatDate(jour)}</strong></p><ul>`;
                    parDate[jour].forEach(rdv => {
                        html += `<li id="rdv-pl-${rdv.id}">
                            ${rdv.heure} — ${rdv.patient.prenom} ${rdv.patient.nom}
                            <button onclick="annulerRdv(${rdv.id}, '${rdv.jour}', '${rdv.heure}', this)">Annuler</button>
                        </li>`;
                    });
                    html += '</ul>';
                });
                div.innerHTML = html;
            } catch (err) {
                div.textContent = 'Erreur lors du chargement.';
            }
        }

        async function annulerRdv(rdvId, jour, heure, btn){
            btn.disabled = true;
            const msg = document.getElementById('message-planning');
            try {
                const response = await fetch(`/rdv/${rdvId}/medecins/${utilisateur.id}`, { method: 'DELETE' });
                if (response.ok){
                    document.getElementById(`rdv-pl-${rdvId}`).remove();
                    msg.textContent = `RDV du ${jour} à ${heure} annulé.`;
                } else {
                    msg.textContent = 'Impossible d\'annuler ce rendez-vous.';
                    btn.disabled = false;
                }
            } catch (err) {
                msg.textContent = 'Erreur de connexion au serveur.';
                btn.disabled = false;
            }
        }

        function voirDossier(p){
            localStorage.setItem('patient-selectionne', JSON.stringify(p));
            window.location.href = '/dossier-patient.html';
        }

        chargerEnAttente();
        chargerPlanning();
    </script>
</body>
</html>
