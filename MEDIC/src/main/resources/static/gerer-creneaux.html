<!DOCTYPE html>
<html lang="fr-FR">
<head>
    <meta charset="UTF-8">
    <title>MEDIC — Gérer les créneaux</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <h1>Gérer les créneaux</h1>
    <div class="contenu">
    <label>Médecin :</label>
    <select id="select-medecin" onchange="chargerCreneaux()">
        <option value="">-- Sélectionner un médecin --</option>
    </select>

    <div id="creneaux-section" style="display:none">
        <hr>
        <h2>Créneaux de <span id="nom-medecin"></span></h2>
        <div id="liste-creneaux"></div>

        <h3>Ajouter un créneau</h3>
        <label>Date :</label>
        <input type="date" id="new-jour">
        <button onclick="ajouterCreneau()">Ajouter</button>
    </div>

    <p id="message"></p>

    <br><button onclick="history.back()">Retour</button>

    <script src="/auth.js"></script>
    <script>
        const utilisateur = getUtilisateur();
        verifierAdmin(utilisateur);

        async function chargerMedecins(){
            try {
                const medecins = await fetch('/medecins/recherche').then(r => r.json());
                const sel = document.getElementById('select-medecin');
                medecins.forEach(m => {
                    const opt = document.createElement('option');
                    opt.value = m.id;
                    opt.textContent = `Dr ${m.nom} ${m.prenom} — ${m.specialite}`;
                    sel.appendChild(opt);
                });
            } catch (err) {
                document.getElementById('message').textContent = 'Erreur lors du chargement des médecins.';
            }
        }

        async function chargerCreneaux(){
            const medecinId = document.getElementById('select-medecin').value;
            const section = document.getElementById('creneaux-section');
            const msg = document.getElementById('message');
            msg.textContent = '';
            if (!medecinId){ section.style.display = 'none'; return; }

            const nomMedecin = document.getElementById('select-medecin').selectedOptions[0].textContent;
            document.getElementById('nom-medecin').textContent = nomMedecin;
            section.style.display = 'block';

            try {
                const maintenant = new Date().toISOString().slice(0, 16);
                const creneaux = (await fetch(`/medecins/${medecinId}/creneaux`).then(r => r.json()))
                    .filter(c => (c.jour + 'T' + c.heure) >= maintenant);
                const div = document.getElementById('liste-creneaux');
                if (creneaux.length === 0){ div.innerHTML = '<p>Aucun créneau.</p>'; return; }
                let html = '<ul>';
                creneaux.forEach(c => {
                    let statut;
                    if (c.estDispo)    statut = 'Disponible';
                    else if (!c.valide) statut = 'En attente';
                    else                statut = 'Confirmé';
                    html += `<li id="creneau-${c.id}">
                        ${formatDate(c.jour)} — ${c.heure} — <em>${statut}</em>
                        <button onclick="supprimerCreneau(${medecinId}, ${c.id}, this)">Supprimer</button>
                    </li>`;
                });
                html += '</ul>';
                div.innerHTML = html;
            } catch (err) {
                document.getElementById('message').textContent = 'Erreur lors du chargement des créneaux.';
            }
        }

        const HEURES = ['09:00','10:00','11:00','13:00','14:00','15:00','16:00','17:00','18:00'];

        function formatDate(dateStr){
            if (!dateStr) return '';
            return new Date(dateStr + 'T00:00:00').toLocaleDateString('fr-FR',
                { weekday:'long', day:'numeric', month:'long', year:'numeric' });
        }

        async function ajouterCreneau(){
            const medecinId = document.getElementById('select-medecin').value;
            const jour = document.getElementById('new-jour').value;
            const msg  = document.getElementById('message');
            if (!jour){ msg.textContent = 'Veuillez choisir une date.'; return; }
            const jourSem = new Date(jour + 'T00:00:00').getDay();
            if (jourSem === 0 || jourSem === 6){ msg.textContent = 'Pas de créneau le week-end.'; return; }
            try {
                await Promise.all(HEURES.map(heure =>
                    fetch(`/medecins/${medecinId}/creneaux`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ jour, heure })
                    })
                ));
                msg.textContent = `${HEURES.length} créneaux ajoutés pour le ${formatDate(jour)}.`;
                chargerCreneaux();
            } catch (err) {
                msg.textContent = 'Erreur de connexion au serveur.';
            }
        }

        async function supprimerCreneau(medecinId, creneauId, btn){
            if (!confirm('Supprimer ce créneau ?')) return;
            btn.disabled = true;
            const msg = document.getElementById('message');
            try {
                const response = await fetch(`/medecins/${medecinId}/creneaux/${creneauId}`, { method: 'DELETE' });
                if (response.ok){
                    document.getElementById(`creneau-${creneauId}`).remove();
                    msg.textContent = 'Créneau supprimé.';
                } else {
                    msg.textContent = 'Erreur lors de la suppression.';
                    btn.disabled = false;
                }
            } catch (err) {
                msg.textContent = 'Erreur de connexion au serveur.';
                btn.disabled = false;
            }
        }

        chargerMedecins();
    </script>
    </div>
</body>
</html>
