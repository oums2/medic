<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <title>MEDIC — Espace Patient</title>
        <link rel="stylesheet" href="/style.css">
    </head>
    <body>
        <h1>Espace Patient</h1>
        <div class="contenu">
        <h2>Mes informations</h2>
        <p>Nom : <span id="nom"></span></p>
        <p>Prénom : <span id="prenom"></span></p>
        <p>Email : <span id="email"></span></p>
        <p>Adresse : <span id="adresse"></span></p>
        <p>Téléphone : <span id="numero"></span></p>

        <button onclick="window.location.href='/modifier-utilisateur.html'">Modifier mes informations</button>

        <br>
        <button onclick="history.back()">Retour</button>

        <script src="/auth.js"></script>
        <script>
            const utilisateur = getUtilisateur();

            document.getElementById('nom').textContent     = utilisateur.nom;
            document.getElementById('prenom').textContent  = utilisateur.prenom;
            document.getElementById('email').textContent   = utilisateur.email;
            document.getElementById('adresse').textContent = utilisateur.adresse;
            document.getElementById('numero').textContent  = utilisateur.numero;
        </script>
        </div>
    </body>
</html>
