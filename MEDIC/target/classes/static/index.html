<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <title>MEDIC — Connexion</title>
    </head>
    <body>
        <h1>Connexion</h1>

        <!--  saisie email + mot de passe -->
        <form id="form-connexion">
            <label>Email :</label><br>
            <input type="email" id="email" required><br><br>

            <label>Mot de passe :</label><br>
            <input type="password" id="motDePasse" required><br><br>

            <button type="submit">Se connecter</button>
        </form>

        <!--  saisie du code reçu par mail (masqué au départ) -->
        <form id="form-code" style="display:none">
            <p>Un code à 6 chiffres a été envoyé à votre adresse email.</p>
            <label>Code de vérification :</label><br>
            <input type="text" id="code" maxlength="6" placeholder="000000" required><br><br>

            <button type="submit">Valider</button>
            <button type="button" onclick="retourConnexion()">Recommencer</button>
        </form>

        <p id="message"></p>

        <p><a href="/inscription.html">Pas encore inscrit ?</a></p>

        <script>
            // Mémorise l'email entre les deux étapes
            let emailEnCours = '';

            document.getElementById('form-connexion').addEventListener('submit', async function(e) {
                e.preventDefault();
                const msg = document.getElementById('message');
                emailEnCours = document.getElementById('email').value;
                const motDePasse = document.getElementById('motDePasse').value;

                try {
                    const response = await fetch('/connexion', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email: emailEnCours, motDePasse })
                    });

                    const data = await response.json();

                    if (response.ok && data.etape === 'code_requis') {
                        
                        document.getElementById('form-connexion').style.display = 'none';
                        document.getElementById('form-code').style.display = 'block';
                        document.getElementById('code').value = '';
                        msg.textContent = '';
                    } else {
                        msg.textContent = data.message || 'Email ou mot de passe incorrect.';
                    }
                } catch (err) {
                    msg.textContent = 'Erreur de connexion au serveur.';
                }
            });

            document.getElementById('form-code').addEventListener('submit', async function(e) {
                e.preventDefault();
                const msg  = document.getElementById('message');
                const code = document.getElementById('code').value.trim();

                try {
                    const response = await fetch('/connexion/verifier-code', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email: emailEnCours, code })
                    });

                    const data = await response.json();

                    if (response.ok) {
                        // Sauvegarde l'utilisateur et redirige selon le rôle
                        localStorage.setItem('utilisateur', JSON.stringify(data));
                        if (data.admin) {
                            window.location.href = '/accueilA.html';
                        } else if (data.specialite !== undefined) {
                            window.location.href = '/accueilM.html';
                        } else {
                            window.location.href = '/accueil.html';
                        }
                    } else {
                        msg.textContent = data.message || 'Code incorrect.';
                    }
                } catch (err) {
                    msg.textContent = 'Erreur de connexion au serveur.';
                }
            });

            
            function retourConnexion() {
                document.getElementById('form-code').style.display = 'none';
                document.getElementById('form-connexion').style.display = 'block';
                document.getElementById('message').textContent = '';
                emailEnCours = '';
            }
        </script>
    </body>
</html>
