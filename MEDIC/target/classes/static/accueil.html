<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <title>MEDIC - Accueil</title>
    </head>
    <body>
        <h1>Accueil</h1>

        <p id="bienvenue"></p>

        <a href="/patient.html" id="lien-espace">Mes informations</a>
        <a href="/" onclick="localStorage.clear()">Se déconnecter</a>
        <hr>

        <h2>Rechercher un médecin</h2>

        <form id="form-recherche">
            <label>Recherche :</label>
            <input type="search" id="recherche" name="recherche" placeholder="recherche...">
            <button type="submit">Rechercher</button>
        </form>

        <div id="resultats"></div>
        <hr>

        <h2>Mes rendez-vous</h2>
        <div id="liste-rdv"><p>Chargement...</p></div>

        <div id="rdv-section" style="display:none">
            <hr>
            <h3>Prendre RDV avec <span id="rdv-nom-medecin"></span></h3>

            <label>Choisir un jour :</label>
            <select id="rdv-jour">
                <option value=""> Sélectionner un jour </option>
                <option>Lundi</option>
                <option>Mardi</option>
                <option>Mercredi</option>
                <option>Jeudi</option>
                <option>Vendredi</option>
                <option>Samedi</option>
            </select>
            <button onclick="voirDispos()">Voir les disponibilités</button>
            <button onclick="fermerRdv()">Annuler</button> <!-- revoir ! pas fan de cette affichage -->

            <div id="rdv-creneaux"></div>
            <p id="rdv-message"></p>
        </div>

        <script>
            // Récupère l'utilisateur connecté depuis le localStorage
            const utilisateur = JSON.parse(localStorage.getItem('utilisateur'));

            // Si pas connecté, redirige vers la page de connexion
            if (!utilisateur){
                window.location.href = '/';
            }

            // Affiche le message de bienvenue
            document.getElementById('bienvenue').textContent =
                `Bienvenue ${utilisateur.prenom} ${utilisateur.nom}`;

            // Adapte selon le rôle
            const lienEspace = document.getElementById('lien-espace');
            if (utilisateur.specialite !== undefined){
                lienEspace.href = '/medecin.html';
                lienEspace.textContent = 'Mes informations';
            }else{
                lienEspace.href = '/patient.html';
                lienEspace.textContent = 'Mes informations';
            }

            // Identifiant du médecin sélectionné pour le RDV
            let medecinSelectionne = null;

            // Recherche selon la valeur saisie
            async function rechercher(){
                const valeur = document.getElementById('recherche').value.trim();

                if (!valeur){
                    tousLesMedecins();
                    return;
                }

                try {
                    const response = await fetch(`/medecins/recherche?q=${encodeURIComponent(valeur)}`);
                    const resultats = await response.json();
                    afficherResultats(resultats);
                }catch (err){
                    document.getElementById('resultats').textContent = 'Erreur lors de la recherche.';
                }
            }

            // Charge et affiche tous les médecins
            async function tousLesMedecins(){
                try{
                    const response = await fetch('/medecins/recherche');
                    const resultats = await response.json();
                    afficherResultats(resultats);
                }catch (err){
                    document.getElementById('resultats').textContent = 'Erreur lors du chargement.';
                }
            }

            // Affiche la liste des médecins 
            function afficherResultats(medecins){
                const div = document.getElementById('resultats');

                if (medecins.length === 0){
                    div.innerHTML = '<p>Aucun médecin trouvé.</p>';
                    return;
                }

                let html = `<p>${medecins.length} médecin(s) trouvé(s)</p><ul>`;
                medecins.forEach(m => {
                    html += `<li>
                        <strong>Dr ${m.nom} ${m.prenom}</strong> — ${m.specialite}
                        <button onclick="ouvrirRdv(${m.id}, 'Dr ${m.prenom} ${m.nom}')">Prendre RDV</button>
                    </li>`;
                });
                html += '</ul>';
                div.innerHTML = html;
            }

            // Ouvre la section RDV pour le médecin choisi
            function ouvrirRdv(medecinId, nomMedecin){
                medecinSelectionne = medecinId;
                document.getElementById('rdv-nom-medecin').textContent = nomMedecin;
                document.getElementById('rdv-jour').value = '';
                document.getElementById('rdv-creneaux').innerHTML = '';
                document.getElementById('rdv-message').textContent = '';
                document.getElementById('rdv-section').style.display = 'block';
                document.getElementById('rdv-section').scrollIntoView();
            }

            // Ferme la section RDV
            function fermerRdv(){
                medecinSelectionne = null;
                document.getElementById('rdv-section').style.display = 'none';
            }

            // Créneau actuellement sélectionné
            let creneauSelectionne = null;

            // Charge les créneaux disponibles pour le jour sélectionné
            async function voirDispos(){
                const jour = document.getElementById('rdv-jour').value;
                const creneauxDiv = document.getElementById('rdv-creneaux');
                const msg = document.getElementById('rdv-message');

                if (!jour){
                    msg.textContent = 'Veuillez choisir un jour.';
                    return;
                }

                msg.textContent = '';
                creneauxDiv.innerHTML = '';
                creneauSelectionne = null;

                try {
                    const response = await fetch(`/medecins/${medecinSelectionne}/dispos?jour=${encodeURIComponent(jour)}`);
                    const creneaux = await response.json();

                    if (creneaux.length === 0){
                        creneauxDiv.innerHTML = '<p>Aucun créneau disponible ce jour.</p>';
                        return;
                    }

                    let html = `<p>${creneaux.length} créneau(x) disponible(s) :</p><p>`;
                    creneaux.forEach(c => {
                        html += `<button id="creneau-${c.id}" onclick="selectionnerCreneau(${c.id}, '${c.jour}', '${c.heure}')">${c.heure}</button> `;
                    });
                    html += `</p><br><button id="btn-valider" onclick="validerRdv()" disabled>Valider</button>`;
                    creneauxDiv.innerHTML = html;
                } catch (err) {
                    msg.textContent = 'Erreur lors du chargement des disponibilités.';
                }
            }

            // Sélectionne un créneau (met en évidence le bouton cliqué)
            function selectionnerCreneau(id, jour, heure){
                // Remet tous les boutons à leur état normal
                if (creneauSelectionne){
                    const ancien = document.getElementById(`creneau-${creneauSelectionne.id}`);
                    if (ancien) ancien.style.fontWeight = 'normal';
                }

                creneauSelectionne = { id, jour, heure };
                const bouton = document.getElementById(`creneau-${id}`);
                if (bouton) bouton.style.fontWeight = 'bold';

                document.getElementById('btn-valider').disabled = false;
            }

            // Confirme la prise de RDV
            async function validerRdv(){
                const msg = document.getElementById('rdv-message');

                if (!creneauSelectionne){
                    msg.textContent = 'Veuillez sélectionner un créneau.';
                    return;
                }

                try {
                    const response = await fetch(`/rdv/patients/${utilisateur.id}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            medecinId: String(medecinSelectionne),
                            jour: creneauSelectionne.jour,
                            heure: creneauSelectionne.heure
                        })
                    });

                    if (response.ok){
                        msg.textContent = `RDV réservé le ${creneauSelectionne.jour} à ${creneauSelectionne.heure}.`;
                        document.getElementById('rdv-creneaux').innerHTML = '';
                        creneauSelectionne = null;
                    } else {
                        const data = await response.json();
                        msg.textContent = data.message || 'Erreur lors de la réservation.';
                    }
                } catch (err) {
                    msg.textContent = 'Erreur de connexion au serveur.';
                }
            }

            // Charge et affiche les rendez-vous du patient
            async function chargerRdv(){
                const div = document.getElementById('liste-rdv');
                try {
                    const response = await fetch(`/patients/${utilisateur.id}/rdv`);
                    const rdvs = await response.json();

                    if (rdvs.length === 0){
                        div.innerHTML = '<p>Aucun rendez-vous.</p>';
                        return;
                    }

                    let html = '<ul>';
                    rdvs.forEach(c => {
                        html += `<li>
                            ${c.jour} à ${c.heure}
                            — Dr ${c.medecin.prenom} ${c.medecin.nom} (${c.medecin.specialite})
                        </li>`;
                    });
                    html += '</ul>';
                    div.innerHTML = html;
                } catch (err) {
                    div.textContent = 'Erreur lors du chargement des rendez-vous.';
                }
            }

            chargerRdv();

            // Soumission du formulaire de recherche
            document.getElementById('form-recherche').addEventListener('submit', function(e){
                e.preventDefault();
                rechercher();
            });

        // tousLesMedecins();
        </script>
    </body>
</html>
