<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>MEDIC - Accueil</title>
</head>
<body>
    <h1>Accueil</h1>
    <p id="bienvenue"></p>
    <nav>
        <a href="/patient.html">Mes informations</a> |
        <span style="cursor:pointer" onclick="toggleNotifs()">Notifications <span id="badge" style="display:none;background:red;color:white;border-radius:50%;padding:1px 5px;font-size:0.75em"></span></span>
        <a href="/" onclick="deconnexion()">Se déconnecter</a>
    </nav>
    <div id="notifs-panel" style="display:none;border:1px solid #ccc;padding:10px;max-width:400px">
        <strong>Notifications</strong>
        <div id="notifs-liste"><em>Aucune notification.</em></div>
    </div>

    <hr>

    <h2>Rechercher un médecin</h2>
    <form id="form-recherche">
        <input type="search" id="recherche" placeholder="Nom, prénom ou spécialité...">
        <button type="submit">Rechercher</button>
    </form>
    <div id="resultats"></div>

    <hr>

    <h2>Mes rendez-vous</h2>
    <div id="liste-rdv"></div>
    <p id="message-rdv"></p>

    <script src="/auth.js"></script>
    <script>
        const utilisateur = getUtilisateur();
        verifierPatient(utilisateur);
        document.getElementById('bienvenue').textContent = `Bienvenue ${utilisateur.prenom} ${utilisateur.nom}`;

        function formatDate(dateStr){
            return new Date(dateStr + 'T00:00:00').toLocaleDateString('fr-FR',
                { weekday:'long', day:'numeric', month:'long', year:'numeric' });
        }

        document.getElementById('form-recherche').addEventListener('submit', function(e){
            e.preventDefault();
            rechercher();
        });

        async function rechercher(){
            const valeur = document.getElementById('recherche').value.trim();
            const url = valeur ? `/medecins/recherche?q=${encodeURIComponent(valeur)}` : '/medecins/recherche';
            try {
                const medecins = await fetch(url).then(r => r.json());
                const div = document.getElementById('resultats');
                if (medecins.length === 0){ div.innerHTML = '<p>Aucun médecin trouvé.</p>'; return; }
                let html = `<p>${medecins.length} médecin(s) trouvé(s)</p><ul>`;
                medecins.forEach(m => {
                    html += `<li>
                        <strong>Dr ${m.nom} ${m.prenom}</strong> — ${m.specialite}
                        <button onclick="allerVersRdv(${JSON.stringify(m).replace(/"/g, '&quot;')})">Prendre RDV</button>
                    </li>`;
                });
                html += '</ul>';
                div.innerHTML = html;
            } catch (err) {
                document.getElementById('resultats').textContent = 'Erreur lors de la recherche.';
            }
        }

        function allerVersRdv(medecin){
            localStorage.setItem('medecin-selectionne', JSON.stringify(medecin));
            window.location.href = '/prendre-rdv.html';
        }

        async function chargerRdv(){
            const div = document.getElementById('liste-rdv');
            try {
                const rdvs = await fetch(`/rdv/patients/${utilisateur.id}`).then(r => r.json());
                if (rdvs.length === 0){ div.innerHTML = '<p>Aucun rendez-vous.</p>'; return; }
                let html = '<ul>';
                rdvs.forEach(rdv => {
                    const statut = rdv.valide ? 'Confirmé' : 'En attente de validation';
                    html += `<li id="rdv-${rdv.id}">
                        Dr ${rdv.medecin.nom} ${rdv.medecin.prenom} (${rdv.medecin.specialite})
                        — ${formatDate(rdv.jour)} à ${rdv.heure} — <em>${statut}</em>
                        <button onclick="annulerRdv(${rdv.id}, '${rdv.jour}', '${rdv.heure}', this)">Annuler</button>
                    </li>`;
                });
                html += '</ul>';
                div.innerHTML = html;
            } catch (err) {
                div.textContent = 'Erreur lors du chargement.';
            }
        }

        async function annulerRdv(rdvId, jour, heure, btn){
            btn.disabled = true;
            const msg = document.getElementById('message-rdv');
            try {
                const response = await fetch(`/rdv/${rdvId}/patients/${utilisateur.id}`, { method: 'DELETE' });
                if (response.ok){
                    document.getElementById(`rdv-${rdvId}`).remove();
                    msg.textContent = `RDV du ${jour} à ${heure} annulé.`;
                } else {
                    msg.textContent = 'Impossible d\'annuler ce rendez-vous.';
                    btn.disabled = false;
                }
            } catch (err) {
                msg.textContent = 'Erreur de connexion au serveur.';
                btn.disabled = false;
            }
        }

        chargerRdv();

        async function chargerNotifs(){
            try {
                const notifs = await fetch(`/notifications/${utilisateur.id}`).then(r => r.json());
                const badge  = document.getElementById('badge');
                const liste  = document.getElementById('notifs-liste');
                if (notifs.length === 0){
                    badge.style.display = 'none';
                    liste.innerHTML = '<em>Aucune notification.</em>';
                } else {
                    badge.textContent  = notifs.length;
                    badge.style.display = 'inline';
                    liste.innerHTML = notifs.map(n =>
                        `<div style="margin:6px 0;padding:6px;background:#f9f9f9">
                            ${n.message}
                            <button onclick="lireNotif(${n.id}, this)" style="float:right;font-size:0.8em">✓</button>
                        </div>`
                    ).join('');
                }
            } catch (err) {}
        }

        async function lireNotif(id, btn){
            await fetch(`/notifications/${id}/lue`, { method: 'PUT' });
            btn.closest('div').remove();
            chargerNotifs();
        }

        function toggleNotifs(){
            const panel = document.getElementById('notifs-panel');
            panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
            if (panel.style.display === 'block') chargerNotifs();
        }

        chargerNotifs();
        setInterval(chargerNotifs, 30000);
    </script>
</body>
</html>
