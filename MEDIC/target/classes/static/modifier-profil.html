<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>MEDIC — Modifier mon profil</title>
</head>
<body>
    <h1>Modifier mon profil</h1>

    <div id="form-patient" style="display:none">
        <label>Nom :</label><br>
        <input type="text" id="p-nom"><br><br>

        <label>Prénom :</label><br>
        <input type="text" id="p-prenom"><br><br>

        <label>Email :</label><br>
        <input type="email" id="p-email"><br><br>

        <label>Nouveau mot de passe (laisser vide pour ne pas changer) :</label><br>
        <input type="password" id="p-mdp"><br><br>

        <label>Adresse :</label><br>
        <input type="text" id="p-adresse"><br><br>

        <label>Téléphone :</label><br>
        <input type="text" id="p-numero"><br><br>
    </div>

    <div id="form-medecin" style="display:none">
        <label>Nom :</label><br>
        <input type="text" id="m-nom"><br><br>

        <label>Prénom :</label><br>
        <input type="text" id="m-prenom"><br><br>

        <label>Email :</label><br>
        <input type="email" id="m-email"><br><br>

        <label>Nouveau mot de passe (laisser vide pour ne pas changer) :</label><br>
        <input type="password" id="m-mdp"><br><br>

        <label>Spécialité :</label><br>
        <select id="m-specialite">
            <option value="">-- Conserver la spécialité actuelle --</option>
            <option>Médecine générale</option>
            <option>Cardiologie</option>
            <option>Dermatologie</option>
            <option>Dentiste</option>
            <option>Gynécologie</option>
            <option>Neurologie</option>
            <option>Ophtalmologie</option>
            <option>Pédiatrie</option>
            <option>Pneumologie</option>
            <option>Psychiatrie</option>
            <option>Radiologie</option>
            <option>Rhumatologie</option>
        </select><br><br>
    </div>

    <button onclick="enregistrer()">Enregistrer</button>
    <button onclick="history.back()">Annuler</button>

    <p id="message"></p>

    <script src="/auth.js"></script>
    <script>
        const utilisateur = getUtilisateur();
        const type = utilisateur.specialite !== undefined ? 'medecin' : 'patient';

        if (type === 'medecin') {
            document.getElementById('form-medecin').style.display = 'block';
            document.getElementById('m-nom').value    = utilisateur.nom;
            document.getElementById('m-prenom').value = utilisateur.prenom;
            document.getElementById('m-email').value  = utilisateur.email;
        } else {
            document.getElementById('form-patient').style.display = 'block';
            document.getElementById('p-nom').value     = utilisateur.nom;
            document.getElementById('p-prenom').value  = utilisateur.prenom;
            document.getElementById('p-email').value   = utilisateur.email;
            document.getElementById('p-adresse').value = utilisateur.adresse || '';
            document.getElementById('p-numero').value  = utilisateur.numero  || '';
        }

        async function enregistrer() {
            const msg  = document.getElementById('message');
            const body = {};
            let url;

            if (type === 'medecin') {
                const nom        = document.getElementById('m-nom').value.trim();
                const prenom     = document.getElementById('m-prenom').value.trim();
                const email      = document.getElementById('m-email').value.trim();
                const mdp        = document.getElementById('m-mdp').value;
                const specialite = document.getElementById('m-specialite').value;
                if (nom)        body.nom        = nom;
                if (prenom)     body.prenom     = prenom;
                if (email)      body.email      = email;
                if (mdp)        body.motDePasse = mdp;
                if (specialite) body.specialite = specialite;
                url = `/medecins/${utilisateur.id}`;
            } else {
                const nom     = document.getElementById('p-nom').value.trim();
                const prenom  = document.getElementById('p-prenom').value.trim();
                const email   = document.getElementById('p-email').value.trim();
                const mdp     = document.getElementById('p-mdp').value;
                const adresse = document.getElementById('p-adresse').value.trim();
                const numero  = document.getElementById('p-numero').value.trim();
                if (nom)     body.nom        = nom;
                if (prenom)  body.prenom     = prenom;
                if (email)   body.email      = email;
                if (mdp)     body.motDePasse = mdp;
                if (adresse) body.adresse    = adresse;
                if (numero)  body.numero     = numero;
                url = `/patients/${utilisateur.id}`;
            }

            try {
                const response = await fetch(url, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('utilisateur', JSON.stringify({ ...utilisateur, ...data }));
                    msg.textContent = 'Profil mis à jour. Redirection...';
                    setTimeout(() => history.back(), 1000);
                } else {
                    msg.textContent = data.message || 'Erreur lors de la mise à jour.';
                }
            } catch (err) {
                msg.textContent = 'Erreur de connexion au serveur.';
            }
        }
    </script>
</body>
</html>
