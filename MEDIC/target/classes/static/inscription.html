<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>MEDIC — Inscription Patient</title>
</head>
<body>
    <h1>Inscription Patient</h1>

    <form id="form-patient">

        <label>Nom :</label><br>
        <input type="text" id="p-nom" required><br><br>

        <label>Prénom :</label><br>
        <input type="text" id="p-prenom" required><br><br>

        <label>Email :</label><br>
        <input type="email" id="p-email" required><br><br>

        <label>Confirmer l'email :</label><br>
        <input type="email" id="p-email-confirm" required><br><br>

        <label>Mot de passe :</label><br>
        <input type="password" id="p-motDePasse" required><br><br>

        <label>Confirmer le mot de passe :</label><br>
        <input type="password" id="p-motDePasse-confirm" required><br><br>

        <label>Adresse :</label><br>
        <input type="text" id="p-adresse"><br><br>

        <label>Numéro de téléphone :</label><br>
        <input type="text" id="p-numero"><br><br>

        <button type="submit">S'inscrire</button>
    </form>

    <p id="message"></p>

    <p><a href="/">Déjà inscrit ? Se connecter</a></p>
    <p>Vous êtes médecin ? <a href="/inscription-medecin.html">Inscription médecin</a></p>

    <script>
        document.getElementById('form-patient').addEventListener('submit', async function(e) {
            e.preventDefault();

            const msg = document.getElementById('message');

            const email        = document.getElementById('p-email').value;
            const emailConfirm = document.getElementById('p-email-confirm').value;
            const mdp          = document.getElementById('p-motDePasse').value;
            const mdpConfirm   = document.getElementById('p-motDePasse-confirm').value;

            if (email !== emailConfirm) {
                msg.textContent = 'Les adresses email ne correspondent pas.';
                return;
            }
            if (mdp !== mdpConfirm) {
                msg.textContent = 'Les mots de passe ne correspondent pas.';
                return;
            }

            try {
                const response = await fetch('/patients/inscription', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        nom:        document.getElementById('p-nom').value,
                        prenom:     document.getElementById('p-prenom').value,
                        email:      email,
                        motDePasse: mdp,
                        adresse:    document.getElementById('p-adresse').value,
                        numero:     document.getElementById('p-numero').value
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    msg.textContent = 'Compte créé avec succès ! Vous pouvez vous connecter.';
                } else {
                    msg.textContent = data.message || 'Une erreur est survenue.';
                }
            } catch (err) {
                msg.textContent = 'Erreur de connexion au serveur.';
            }
        });
    </script>
</body>
</html>
